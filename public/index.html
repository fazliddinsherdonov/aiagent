<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Xodimlar Boshqaruvi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════ LOADER ═══════════════════════ -->
<div id="loader" class="loader-overlay">
  <div class="loader-content">
    <div class="loader-spinner"></div>
    <p>Yuklanmoqda...</p>
  </div>
</div>

<!-- ═══════════════════════ TOAST ═══════════════════════ -->
<div id="toast" class="toast"></div>

<!-- ═══════════════════════ LOGIN PAGE ═══════════════════════ -->
<div id="login-page" class="page hidden">
  <div class="login-bg">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon"><i class="fas fa-users"></i></div>
        <h1>Xodimlar Boshqaruvi</h1>
        <p>Tizimga kirish</p>
      </div>

      <div class="role-tabs">
        <button class="role-tab active" data-role="worker"><i class="fas fa-user"></i> Xodim</button>
        <button class="role-tab" data-role="admin"><i class="fas fa-user-tie"></i> Admin</button>
        <button class="role-tab" data-role="superadmin"><i class="fas fa-star"></i> S.Admin</button>
        <button class="role-tab" data-role="owner"><i class="fas fa-crown"></i> Ega</button>
      </div>

      <div class="login-form">

        <!-- XODIM / ADMIN / SUPERADMIN: faqat Telegram ID -->
        <div class="form-group" id="field-worker" style="display:block">
          <label><i class="fab fa-telegram"></i> Telegram ID</label>
          <input type="text" id="login-tgid" placeholder="123456789"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')"
            style="font-size:1.1rem;letter-spacing:1px">
        </div>

        <!-- EGA: Telegram ID + parol -->
        <div id="field-admin-owner" style="display:none">
          <div class="form-group">
            <label><i class="fab fa-telegram"></i> Telegram ID</label>
            <input type="text" id="login-owner-tgid" placeholder="123456789"
              oninput="this.value=this.value.replace(/[^0-9]/g,'')"
              style="font-size:1.1rem;letter-spacing:1px">
            <small style="color:var(--text3);font-size:0.75rem">Botda /myid buyrug'i orqali oling</small>
          </div>
          <div class="form-group" style="margin-top:12px">
            <label><i class="fas fa-lock"></i> Parol</label>
            <div class="input-icon-right">
              <input type="password" id="login-pass" placeholder="Parolni kiriting" autocomplete="current-password">
              <button type="button" class="eye-btn" onclick="togglePass('login-pass', this)"><i class="fas fa-eye"></i></button>
            </div>
            <small style="color:var(--text3);font-size:0.75rem">Parolni botda /setpassword orqali o'rnating</small>
          </div>
        </div>

        <button class="btn btn-primary btn-lg" style="margin-top:8px" onclick="doLogin()">
          <i class="fas fa-sign-in-alt"></i> Kirish
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════ OWNER PANEL ═══════════════════════ -->
<div id="owner-panel" class="panel hidden">

  <!-- Header -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="avatar-sm" id="owner-avatar-bar"><i class="fas fa-crown"></i></div>
      <div>
        <div class="topbar-name" id="owner-name-bar">Ega</div>
        <div class="topbar-role">Ega paneli</div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="panel-content" id="owner-content"></div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="dashboard" onclick="ownerTab('dashboard', this)">
      <i class="fas fa-chart-pie"></i><span>Bosh</span>
    </button>
    <button class="nav-item" data-tab="workers" onclick="ownerTab('workers', this)">
      <i class="fas fa-users"></i><span>Xodimlar</span>
    </button>
    <button class="nav-item" data-tab="admins" onclick="ownerTab('admins', this)">
      <i class="fas fa-user-shield"></i><span>Adminlar</span>
    </button>
    <button class="nav-item" data-tab="stats" onclick="ownerTab('stats', this)">
      <i class="fas fa-chart-bar"></i><span>Statistika</span>
    </button>
    <button class="nav-item" data-tab="settings" onclick="ownerTab('settings', this)">
      <i class="fas fa-cog"></i><span>Sozlamalar</span>
    </button>
  </nav>
</div>

<!-- ═══════════════════════ ADMIN PANEL ═══════════════════════ -->
<div id="admin-panel" class="panel hidden">
  <div class="topbar">
    <div class="topbar-left">
      <div class="avatar-sm" id="admin-avatar-bar"><i class="fas fa-user-tie"></i></div>
      <div>
        <div class="topbar-name" id="admin-name-bar">Admin</div>
        <div class="topbar-role">Admin paneli</div>
      </div>
    </div>
  </div>

  <div class="panel-content" id="admin-content"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="dashboard" onclick="adminTab('dashboard', this)">
      <i class="fas fa-chart-pie"></i><span>Bosh</span>
    </button>
    <button class="nav-item" data-tab="workers" onclick="adminTab('workers', this)">
      <i class="fas fa-users"></i><span>Xodimlar</span>
    </button>
    <button class="nav-item" data-tab="stats" onclick="adminTab('stats', this)">
      <i class="fas fa-chart-bar"></i><span>Statistika</span>
    </button>
    <button class="nav-item" data-tab="profile" onclick="adminTab('profile', this)">
      <i class="fas fa-user-circle"></i><span>Profil</span>
    </button>
  </nav>
</div>

<!-- ═══════════════════════ WORKER PANEL ═══════════════════════ -->
<div id="worker-panel" class="panel hidden">
  <div class="topbar">
    <div class="topbar-left">
      <div class="avatar-sm" id="worker-avatar-bar"><i class="fas fa-user"></i></div>
      <div>
        <div class="topbar-name" id="worker-name-bar">Xodim</div>
        <div class="topbar-role">Xodim paneli</div>
      </div>
    </div>
  </div>

  <div class="panel-content" id="worker-content"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="home" onclick="workerTab('home', this)">
      <i class="fas fa-home"></i><span>Bosh</span>
    </button>
    <button class="nav-item" data-tab="photo" onclick="workerTab('photo', this)">
      <i class="fas fa-camera"></i><span>Rasm</span>
    </button>
    <button class="nav-item" data-tab="logs" onclick="workerTab('logs', this)">
      <i class="fas fa-history"></i><span>Tarix</span>
    </button>
    <button class="nav-item" data-tab="profile" onclick="workerTab('profile', this)">
      <i class="fas fa-user-circle"></i><span>Profil</span>
    </button>
  </nav>
</div>

<!-- ═══════════════════════ MODAL ═══════════════════════ -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="icon-btn" onclick="closeModalForce()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Image Preview -->
<div id="img-preview" class="img-preview hidden" onclick="this.classList.add('hidden')">
  <img id="img-preview-src" src="" alt="Preview">
</div>

<script src="app.js"></script>
</body>
</html>
